# Background
background            #212121
foreground            #d0d0d0

color0                #212121
color1                #c0464c
color2                #4caa5e
color3                #b8963e
color4                #4a7fb5
color5                #8f57b0
color6                #3d9aa1
color7                #c8c8c8

color8                #646464
color9                #d4595f
color10               #5cbd70
color11               #ccaa4e
color12               #5b91c8
color13               #a36bc4
color14               #4db3bb
color15               #ffffff
background_opacity 1.0

# Font
font_family      JetbrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 10.10
adjust_line_height 110%
adjust_column_width 100%

# Link
show_hyperlink_targets no
underline_hyperlinks hover

# Other
enable_audio_bell no
sync_to_monitor yes
repaint_delay 10
input_delay 3
scrollback_lines 20000
strip_trailing_spaces smart
clipboard_control write-clipboard write-primary
mouse_hide_wait 2.0
focus_follows_mouse yes

# Keymapping
# Tab
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
# Split
map ctrl+shift+enter launch --location=hsplit
map ctrl+shift+backspace launch --location=vsplit
# Focus pane
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down
# Resize pane
map ctrl+shift+alt+h resize_window narrower
map ctrl+shift+alt+l resize_window wider
map ctrl+shift+alt+k resize_window taller
map ctrl+shift+alt+j resize_window shorter

copy_on_select yes
